services:
  - type: web
    name: bpo-address-capture
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RENDER_EXTERNAL_URL
        value: https://bpo-address-capture.onrender.com
